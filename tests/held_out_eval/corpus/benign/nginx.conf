# Reverse proxy in front of the Quill app.
upstream quill_backend {
    server 127.0.0.1:8080;
    keepalive 16;
}

server {
    listen 80;
    server_name quill.example.com;

    # Redirect all plain HTTP to HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name quill.example.com;

    ssl_certificate     /etc/ssl/certs/quill.crt;
    ssl_certificate_key /etc/ssl/private/quill.key;

    client_max_body_size 5m;
    gzip on;
    gzip_types application/json text/css application/javascript;

    location /healthz {
        proxy_pass http://quill_backend;
        access_log off;
    }

    location / {
        proxy_pass http://quill_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
