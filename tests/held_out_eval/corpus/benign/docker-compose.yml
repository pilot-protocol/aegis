version: "3.9"

services:
  web:
    build: .
    image: quill:latest
    ports:
      - "8080:8080"
    environment:
      - DB_PATH=/data/quill.db
      - LOG_LEVEL=info
    volumes:
      - quill-data:/data
    depends_on:
      - cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  cache:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    restart: unless-stopped

volumes:
  quill-data:
