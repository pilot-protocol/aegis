name: release

# Build cross-platform binaries on every version tag and attach them to the
# GitHub Release. Linux runners link natively, so musl static builds "just work".
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            name: aegis-macos-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            name: aegis-macos-x86_64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            name: aegis-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            name: aegis-linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install musl/cross tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          cargo install cross --git https://github.com/cross-rs/cross || true
      - name: Build
        run: |
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-musl" ]]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi
      - name: Rename artifact
        run: cp target/${{ matrix.target }}/release/aegis ${{ matrix.name }}
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.name }}
          fail_on_unmatched_files: true
